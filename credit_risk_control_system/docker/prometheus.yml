# Prometheus 配置 — 信贷风控系统监控
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'credit-inference-gateway'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['inference-gateway:8000']
        labels:
          service: 'credit-risk-control'
          env: 'dev'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# 告警规则
rule_files:
  - 'alert_rules.yml'
