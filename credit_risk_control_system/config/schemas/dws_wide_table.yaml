# ============================================================
# DWS 层 — 用户风险特征宽表 (Data Warehouse Summary)
#
# ★ 这是整个数仓的核心层 ★
# 粒度: 用户 × 日期（每人每天一行）
# 来源: dwd_application + dwd_user_behavior + dwd_repayment 三表聚合
#
# 一行宽表 = 一个用户在某一天的完整风险画像
# ============================================================

wide_table:

  # ── 表基本信息 ──
  table_name: user_risk_feature_wide
  partition_key: dt
  grain: "用户 × 日期"
  description: >
    用户风险特征宽表。将散落在3张DWD明细表中的同一用户数据，
    按时间窗口聚合为17维特征向量。下游ADS层的模型训练样本直接
    取自此表，实时推理的在线特征也是这些字段。

  # ── 主键 ──
  primary_key:
    - user_id
    - dt

  # ═══════════════════════════════════════════
  # 特征分类1: 申请行为画像 (← dwd_application)
  # 聚合方式: groupby(user_id).agg()
  # ═══════════════════════════════════════════
  category_profile:
    label: "申请行为画像"
    source_table: dwd_application
    aggregation: "groupby(user_id).agg()"

    features:
      - name: apply_amount_avg
        type: DOUBLE
        nullable: false
        default: 0.0
        aggregation: "mean(apply_amount)"
        description: "历史平均申请金额(元)。反映用户的借款习惯"
        risk_direction: "过高→可能资金紧张"

      - name: apply_amount_max
        type: DOUBLE
        nullable: false
        default: 0.0
        aggregation: "max(apply_amount)"
        description: "历史最大申请金额(元)。峰值反映借款激进程度"
        risk_direction: "过高→风险↑"

      - name: monthly_income
        type: DOUBLE
        nullable: false
        default: 0.0
        aggregation: "max(monthly_income)"
        description: "月收入(元)。多次申请取最高值（保守估计）"
        risk_direction: "越高→还款能力越强"

      - name: total_apply_cnt
        type: INTEGER
        nullable: false
        default: 0
        aggregation: "nunique(application_id)"
        description: "历史总申请次数（所有时间）"
        risk_direction: "越高→多头风险↑"

      - name: distinct_device_cnt
        type: INTEGER
        nullable: false
        default: 1
        aggregation: "nunique(device_id)"
        description: "关联的不同设备数。>2 可能账号被盗或共享"
        risk_direction: "越多→欺诈风险↑"

      - name: distinct_city_cnt
        type: INTEGER
        nullable: false
        default: 1
        aggregation: "nunique(city)"
        description: "关联的不同城市数。频繁跨城→异常"
        risk_direction: "越多→欺诈风险↑"

  # ═══════════════════════════════════════════
  # 特征分类2: 行为衍生特征 (← dwd_user_behavior)
  # 聚合方式: 按用户分组 → 时间窗口滑动 → 事件计数
  # ═══════════════════════════════════════════
  category_behavior:
    label: "行为衍生特征"
    source_table: dwd_user_behavior
    aggregation: "groupby(user_id) → 时间窗口过滤 → 事件类型聚合"

    features:
      - name: apply_cnt_7d
        type: INTEGER
        nullable: false
        default: 0
        window: "近7天"
        aggregation: "sum(event_type == 'submit' AND event_time >= ref_date-7d)"
        description: "近7天提交申请次数。反映短期资金需求强度"
        risk_direction: "越高→多头风险↑"

      - name: apply_cnt_30d
        type: INTEGER
        nullable: false
        default: 0
        window: "近30天"
        aggregation: "sum(event_type == 'submit' AND event_time >= ref_date-30d)"
        description: "近30天提交申请次数"
        risk_direction: "越高→多头风险↑"

      - name: night_ops_ratio_30d
        type: DOUBLE
        nullable: false
        default: 0.0
        range: [0.0, 1.0]
        window: "近30天"
        aggregation: "mean(event_time.hour IN [22,23,0,1,2,3,4,5])"
        description: >
          ★ 深夜操作占比 = 夜间(22:00-05:00)事件数 / 总事件数。
          这是风控强特征——正常用户深夜操作少，欺诈团伙常在夜间批量操作。
        risk_direction: ">60%→高度可疑，触发人工审核"

      - name: page_view_cnt_7d
        type: INTEGER
        nullable: false
        default: 0
        window: "近7天"
        aggregation: "sum(event_type == 'page_view' AND event_time >= ref_date-7d)"
        description: "近7天页面浏览次数。反映App使用频率"
        risk_direction: "中性——正常用户也会频繁浏览"

      - name: input_cnt_7d
        type: INTEGER
        nullable: false
        default: 0
        window: "近7天"
        aggregation: "sum(event_type == 'input' AND event_time >= ref_date-7d)"
        description: "近7天输入操作次数。填写表单的活跃度"
        risk_direction: "极低→可能是自动化脚本"

      - name: error_event_cnt_7d
        type: INTEGER
        nullable: false
        default: 0
        window: "近7天"
        aggregation: "sum(event_type == 'error' AND event_time >= ref_date-7d)"
        description: "近7天错误事件次数。频繁报错→可能是脚本或异常操作"
        risk_direction: "越高→异常↑"

  # ═══════════════════════════════════════════
  # 特征分类3: 还款表现特征 (← dwd_repayment)
  # 聚合方式: groupby(user_id).agg()
  # ═══════════════════════════════════════════
  category_repayment:
    label: "还款表现特征"
    source_table: dwd_repayment
    aggregation: "groupby(user_id).agg()"

    features:
      - name: overdue_cnt_hist
        type: INTEGER
        nullable: false
        default: 0
        aggregation: "sum(status == 'OVERDUE')"
        description: "历史逾期次数。最直接的还款意愿指标"
        risk_direction: ">0→风险显著升高"

      - name: total_due_amount
        type: DOUBLE
        nullable: false
        default: 0.0
        aggregation: "sum(due_amount)"
        description: "历史总应还金额(元)。反映总的负债规模"
        risk_direction: "相对收入过高→风险↑"

      - name: total_paid_amount
        type: DOUBLE
        nullable: false
        default: 0.0
        aggregation: "sum(paid_amount)"
        description: "历史总实还金额(元)。应与total_due_amount对比"
        risk_direction: "远低于due→逾期严重"

      - name: repayment_cnt
        type: INTEGER
        nullable: false
        default: 0
        aggregation: "count(repayment_id)"
        description: "总还款笔数。用于计算on_time_rate的分母"
        risk_direction: "中性——更多还款记录→更有信用的用户"

      - name: on_time_rate
        type: DOUBLE
        nullable: false
        default: 1.0
        range: [0.0, 1.0]
        aggregation: >
          np.where(repayment_cnt > 0,
                   1 - overdue_cnt_hist / repayment_cnt,
                   1.0)
        description: >
          按时还款率 = 1 - 逾期次数/总还款次数。
          新用户(无还款记录)默认为1.0。
          例如: 3笔还款中2笔逾期 → 0.33 → 高风险。
        risk_direction: "越低→风险越高"

  # ═══════════════════════════════════════════
  # 分区字段
  # ═══════════════════════════════════════════
  partition:
    - name: dt
      type: STRING
      nullable: false
      description: "分区键 — 特征快照日期 YYYY-MM-DD"

# ═══════════════════════════════════════════
# 特征工程规约
# ═══════════════════════════════════════════
feature_engineering_rules:
  missing_value_policy:
    description: "缺失值统一填充为0（left join导致无行为/无还款记录的用户）"
    implementation: "wide_table[numeric_cols].fillna(0)"

  time_window_policy:
    description: >
      所有时间窗口以 dt 分区日期为基准向后推算。
      例如 dt='2026-07-01'，apply_cnt_7d 统计范围为 2026-06-24 ~ 2026-07-01。
    principle: "PIT (Point-in-Time) — 不使用未来信息"

  new_user_policy:
    description: >
      新用户无行为记录和无还款记录：
      - 行为特征：全部为0（从未在App操作）
      - on_time_rate：默认为1.0（无逾期历史即无罪推定）
    implementation: "left join + fillna(0)"
